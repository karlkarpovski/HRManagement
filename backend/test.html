<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Add Employee API</title>
</head>
<body>
    <h2>Test API Add Employee</h2>

    <label>First Name:</label><br>
    <input type="text" id="first_name"><br><br>

    <label>Last Name:</label><br>
    <input type="text" id="last_name"><br><br>

    <label>Email:</label><br>
    <input type="text" id="email"><br><br>

    <label>Department ID:</label><br>
    <input type="number" id="dept_id"><br><br>

    <label>Date of Birth:</label><br>
    <input type="date" id="dob"><br><br>

    <label>Position ID:</label><br>
    <input type="number" id="pos_id"><br><br>

    <button onclick="sendData()">Gửi API</button>

    <h3>Kết quả:</h3>
    <pre id="result"></pre>

    <script>
        function sendData() {
            const data = {
                first_name: document.getElementById("first_name").value,
                last_name: document.getElementById("last_name").value,
                email: document.getElementById("email").value,
                dob: document.getElementById("dob").value,
                dept_id: parseInt(document.getElementById("dept_id").value),
                pos_id: parseInt(document.getElementById("pos_id").value)
            };

            fetch("http://localhost:5000/api/employees", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").textContent =
                    JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById("result").textContent = err;
            });
        }
    </script>
</body>
</html>
